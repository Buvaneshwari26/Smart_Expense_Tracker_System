<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Expense Tracker — Register</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="css/globals.css"/>
</head>
<body class="auth-page">
<div class="auth-bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="auth-container">
  <div class="glass-card auth-card" style="max-width:480px">
    <div class="auth-logo">
      <div class="logo-icon"><i class="bi bi-wallet2"></i></div>
      <h1 class="logo-title">Smart Expense<br/><span>Tracker</span></h1>
    </div>
    <h2 class="auth-heading">Create Account</h2>
    <p class="auth-sub">Start tracking your finances today</p>

    <div id="alert-box" class="alert d-none" role="alert"></div>

    <form id="register-form" novalidate>
      <div class="row g-3">
        <div class="col-6">
          <div class="form-floating">
            <input type="text" class="form-control glass-input" id="fullName" placeholder="Full Name" required/>
            <label for="fullName"><i class="bi bi-person me-1"></i>Full Name</label>
          </div>
        </div>
        <div class="col-6">
          <div class="form-floating">
            <input type="text" class="form-control glass-input" id="username" placeholder="Username" required/>
            <label for="username"><i class="bi bi-at me-1"></i>Username</label>
          </div>
        </div>
        <div class="col-12">
          <div class="form-floating">
            <input type="email" class="form-control glass-input" id="email" placeholder="Email" required/>
            <label for="email"><i class="bi bi-envelope me-1"></i>Email Address</label>
          </div>
        </div>
        <div class="col-12">
          <div class="form-floating">
            <input type="text" class="form-control glass-input" id="phone" placeholder="Phone"/>
            <label for="phone"><i class="bi bi-phone me-1"></i>Phone (optional)</label>
          </div>
        </div>
        <div class="col-12 position-relative">
          <div class="form-floating">
            <input type="password" class="form-control glass-input" id="password" placeholder="Password" required/>
            <label for="password"><i class="bi bi-lock me-1"></i>Password</label>
          </div>
          <button type="button" class="btn-toggle-pw" onclick="togglePw('password',this)">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-glow mt-3" id="reg-btn">
        <span id="reg-text"><i class="bi bi-person-plus me-2"></i>Create Account</span>
        <span id="reg-spinner" class="d-none spinner-border spinner-border-sm"></span>
      </button>
    </form>
    <p class="auth-footer mt-3">Already have an account? <a href="login.html">Sign in</a></p>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('reg-btn');
    const text = document.getElementById('reg-text');
    const spinner = document.getElementById('reg-spinner');
    btn.disabled = true; text.classList.add('d-none'); spinner.classList.remove('d-none');
    try {
      await Auth.register({
        fullName: document.getElementById('fullName').value,
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        phoneNumber: document.getElementById('phone').value
      });
      showAlert('success', '✅ Account created! Redirecting to dashboard…');
      setTimeout(() => window.location.href = 'dashboard.html', 1200);
    } catch (err) {
      showAlert('danger', '❌ ' + (err.message || 'Registration failed'));
    } finally {
      btn.disabled = false; text.classList.remove('d-none'); spinner.classList.add('d-none');
    }
  });
  function showAlert(type, msg) {
    const box = document.getElementById('alert-box');
    box.className = `alert alert-${type}`;
    box.textContent = msg;
  }
  function togglePw(id, btn) {
    const inp = document.getElementById(id);
    const isText = inp.type === 'text';
    inp.type = isText ? 'password' : 'text';
    btn.querySelector('i').className = isText ? 'bi bi-eye' : 'bi bi-eye-slash';
  }
</script>
</body>
</html>
