<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Savings Goals — Smart Expense Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="css/globals.css"/>
</head>
<body>
<button class="sidebar-toggle d-md-none"><i class="bi bi-list"></i></button>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo-icon"><i class="bi bi-wallet2"></i></div>
      <span class="brand-text">ExpenseTracker</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link"><i class="bi bi-grid-1x2"></i><span>Dashboard</span></a>
      <a href="income.html" class="nav-link"><i class="bi bi-cash-stack"></i><span>Income</span></a>
      <a href="expense.html" class="nav-link"><i class="bi bi-credit-card"></i><span>Expenses</span></a>
      <a href="category.html" class="nav-link"><i class="bi bi-tags"></i><span>Categories</span></a>
      <a href="budget.html" class="nav-link"><i class="bi bi-pie-chart"></i><span>Budgets</span></a>
      <a href="savings.html" class="nav-link"><i class="bi bi-piggy-bank"></i><span>Savings Goals</span></a>
      <a href="reports.html" class="nav-link"><i class="bi bi-graph-up"></i><span>Reports</span></a>
      <a href="profile.html" class="nav-link"><i class="bi bi-person-circle"></i><span>Profile</span></a>
    </nav>
    <div class="sidebar-footer">
      <span id="sidebar-username">User</span>
      <button onclick="Auth.logout()" class="btn btn-sm btn-outline-danger"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </div>
  </aside>
  <main class="main-content">
    <!-- Header injected by UI.initHeader() -->

    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h2 class="mb-1">Savings Goals</h2>
        <p class="text-secondary mb-0">Track your financial milestones and targets</p>
      </div>
      <button class="btn btn-glow" onclick="openModal()"><i class="bi bi-plus-lg me-2"></i>New Goal</button>
    </div>

    <!-- Stats Overview -->
    <div class="row g-3 mb-4" id="stats-row">
      <div class="col-md-3">
        <div class="glass-card stat-card">
          <div class="stat-icon" style="background:rgba(78,204,163,0.15);color:var(--accent);"><i class="bi bi-piggy-bank"></i></div>
          <div class="stat-value" id="stat-goals">0</div>
          <div class="stat-label">Total Goals</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="glass-card stat-card">
          <div class="stat-icon" style="background:rgba(59,130,246,0.15);color:#3b82f6;"><i class="bi bi-check-circle"></i></div>
          <div class="stat-value" id="stat-completed">0</div>
          <div class="stat-label">Completed</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="glass-card stat-card">
          <div class="stat-icon" style="background:rgba(245,166,35,0.15);color:var(--warning);"><i class="bi bi-currency-rupee"></i></div>
          <div class="stat-value" id="stat-saved">₹0</div>
          <div class="stat-label">Total Saved</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="glass-card stat-card">
          <div class="stat-icon" style="background:rgba(139,92,246,0.15);color:#8b5cf6;"><i class="bi bi-target"></i></div>
          <div class="stat-value" id="stat-target">₹0</div>
          <div class="stat-label">Total Target</div>
        </div>
      </div>
    </div>

    <!-- Goals Grid -->
    <div id="goals-grid" class="row g-3"></div>
    <div id="empty-state-container"></div>
  </main>
</div>

<!-- Goal Modal -->
<div class="modal fade" id="goalModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-glass">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="modalTitle">New Savings Goal</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-0">
        <form id="goalForm" class="glass-form">
          <input type="hidden" id="goalId">
          <div class="mb-3">
            <label class="form-label">Goal Name</label>
            <input type="text" class="form-control" id="goalName" required placeholder="e.g. Emergency Fund, New Laptop...">
          </div>
          <div class="mb-3">
            <label class="form-label">Target Amount (₹)</label>
            <input type="number" step="0.01" class="form-control" id="targetAmount" required placeholder="0.00">
          </div>
          <div class="mb-3">
            <label class="form-label">Current Saved Amount (₹)</label>
            <input type="number" step="0.01" class="form-control" id="savedAmount" value="0" min="0">
          </div>
          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label">Start Date</label>
              <input type="date" class="form-control" id="startDate" required>
            </div>
            <div class="col-6">
              <label class="form-label">Target Date</label>
              <input type="date" class="form-control" id="targetDate" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Description / Notes</label>
            <textarea class="form-control" id="goalDesc" rows="2" placeholder="Why is this goal important?"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Status</label>
            <select class="form-select" id="goalStatus">
              <option value="IN_PROGRESS">In Progress</option>
              <option value="COMPLETED">Completed</option>
              <option value="PAUSED">Paused</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-glow" onclick="saveGoal()"><i class="bi bi-check-lg me-1"></i>Save Goal</button>
      </div>
    </div>
  </div>
</div>

<!-- Contribute Modal -->
<div class="modal fade" id="contributeModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-glass">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h5 class="modal-title">Add Contribution</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-0">
        <form id="contributeForm" class="glass-form">
          <input type="hidden" id="contributeGoalId">
          <p class="text-secondary mb-3" id="contributeGoalName"></p>
          <div class="mb-3">
            <label class="form-label">Contribution Amount (₹)</label>
            <input type="number" step="0.01" class="form-control" id="contributeAmount" required placeholder="0.00">
          </div>
          <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date" class="form-control" id="contributeDate" required>
          </div>
        </form>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-glow" onclick="saveContribution()"><i class="bi bi-plus-lg me-1"></i>Add</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script>
  Auth.requireAuth();
  UI.initSidebar();
  UI.initHeader();
  let goalModal = new bootstrap.Modal(document.getElementById('goalModal'));
  let contributeModal = new bootstrap.Modal(document.getElementById('contributeModal'));
  let allGoals = [];

  const STATUS_CONFIG = {
    'IN_PROGRESS': { label: 'In Progress', bg: '#3b82f633', color: '#3b82f6', icon: 'bi-hourglass-split' },
    'COMPLETED':   { label: 'Completed',   bg: '#4ecca333', color: '#4ecca3', icon: 'bi-check-circle-fill' },
    'PAUSED':      { label: 'Paused',      bg: '#f5a62333', color: '#f5a623', icon: 'bi-pause-circle' }
  };

  async function loadData() {
    const grid = document.getElementById('goals-grid');
    const emptyContainer = document.getElementById('empty-state-container');
    grid.innerHTML = Array(4).fill('<div class="col-md-6"><div class="glass-card skeleton-loader" style="height:220px;"></div></div>').join('');
    emptyContainer.innerHTML = '';
    try {
      allGoals = await Api.get(`/savings-goals?userId=${Api.getUserId()}`);
      renderGrid();
    } catch (err) { UI.showToast(err.message, 'error'); }
  }

  function renderGrid() {
    const grid = document.getElementById('goals-grid');
    const emptyContainer = document.getElementById('empty-state-container');
    grid.innerHTML = '';
    emptyContainer.innerHTML = '';

    if (!allGoals || allGoals.length === 0) {
      UI.renderEmptyState(emptyContainer, 'No Savings Goals Yet', 'Set your first financial target and start tracking your progress.', 'bi-piggy-bank', 'New Goal', openModal);
      updateStats([]);
      return;
    }

    updateStats(allGoals);

    allGoals.forEach(goal => {
      const pct = goal.targetAmount > 0 ? Math.min(100, Math.round((goal.savedAmount / goal.targetAmount) * 100)) : 0;
      const status = STATUS_CONFIG[goal.status] || STATUS_CONFIG['IN_PROGRESS'];
      const daysLeft = goal.targetDate ? Math.ceil((new Date(goal.targetDate) - new Date()) / (1000*60*60*24)) : null;
      const remaining = Math.max(0, (goal.targetAmount || 0) - (goal.savedAmount || 0));

      grid.innerHTML += `
        <div class="col-md-6 animate-in">
          <div class="glass-card h-100">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <div class="flex-grow-1 me-2">
                <h6 class="fw-600 mb-1">${goal.name}</h6>
                <span class="badge" style="background:${status.bg};color:${status.color};font-size:0.72rem;"><i class="bi ${status.icon} me-1"></i>${status.label}</span>
              </div>
              <div class="d-flex gap-1">
                <button class="btn btn-sm" style="background:rgba(78,204,163,0.1);color:var(--accent);border:1px solid rgba(78,204,163,0.3);" onclick="openContribute(${goal.id}, '${goal.name}')" title="Add Contribution"><i class="bi bi-plus-lg"></i></button>
                <button class="btn btn-sm btn-outline-info" onclick='editGoal(${JSON.stringify(goal)})' title="Edit"><i class="bi bi-pencil"></i></button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteGoal(${goal.id})" title="Delete"><i class="bi bi-trash"></i></button>
              </div>
            </div>
            ${goal.description ? `<p class="text-secondary mb-3" style="font-size:0.82rem;">${goal.description}</p>` : ''}
            <div class="d-flex justify-content-between mb-2">
              <span style="font-size:0.85rem;">
                <span style="color:var(--accent);font-weight:600;">${UI.formatCurrency(goal.savedAmount)}</span>
                <span class="text-secondary"> / ${UI.formatCurrency(goal.targetAmount)}</span>
              </span>
              <span class="fw-bold" style="color:${pct >= 100 ? 'var(--accent)' : 'var(--text-primary)'};">${pct}%</span>
            </div>
            <div class="progress-bar-custom mb-3">
              <div class="progress-bar-fill" style="width:${pct}%;background:${pct >= 100 ? 'var(--accent)' : 'linear-gradient(90deg, var(--accent), #3b82f6)'};"></div>
            </div>
            <div class="d-flex justify-content-between text-secondary" style="font-size:0.78rem;">
              <span>Remaining: <strong style="color:var(--text-primary);">${UI.formatCurrency(remaining)}</strong></span>
              ${daysLeft !== null ? `<span>${daysLeft > 0 ? `${daysLeft} days left` : daysLeft === 0 ? 'Due Today!' : `${Math.abs(daysLeft)} days overdue`}</span>` : ''}
            </div>
            ${goal.targetDate ? `<div class="text-secondary mt-1" style="font-size:0.75rem;"><i class="bi bi-calendar me-1"></i>Target: ${UI.formatDate(goal.targetDate)}</div>` : ''}
          </div>
        </div>
      `;
    });
  }

  function updateStats(goals) {
    const completed = goals.filter(g => g.status === 'COMPLETED').length;
    const totalSaved = goals.reduce((s, g) => s + (g.savedAmount || 0), 0);
    const totalTarget = goals.reduce((s, g) => s + (g.targetAmount || 0), 0);
    document.getElementById('stat-goals').textContent = goals.length;
    document.getElementById('stat-completed').textContent = completed;
    document.getElementById('stat-saved').textContent = UI.formatCurrency(totalSaved);
    document.getElementById('stat-target').textContent = UI.formatCurrency(totalTarget);
  }

  function openModal() {
    document.getElementById('goalForm').reset();
    document.getElementById('goalId').value = '';
    document.getElementById('startDate').valueAsDate = new Date();
    document.getElementById('modalTitle').textContent = 'New Savings Goal';
    goalModal.show();
  }

  function editGoal(goal) {
    document.getElementById('goalId').value = goal.id;
    document.getElementById('goalName').value = goal.name;
    document.getElementById('targetAmount').value = goal.targetAmount;
    document.getElementById('savedAmount').value = goal.savedAmount || 0;
    document.getElementById('startDate').value = goal.startDate;
    document.getElementById('targetDate').value = goal.targetDate;
    document.getElementById('goalDesc').value = goal.description || '';
    document.getElementById('goalStatus').value = goal.status || 'IN_PROGRESS';
    document.getElementById('modalTitle').textContent = 'Edit Savings Goal';
    goalModal.show();
  }

  function openContribute(goalId, goalName) {
    document.getElementById('contributeGoalId').value = goalId;
    document.getElementById('contributeGoalName').textContent = `Goal: ${goalName}`;
    document.getElementById('contributeDate').valueAsDate = new Date();
    document.getElementById('contributeAmount').value = '';
    contributeModal.show();
  }

  async function saveContribution() {
    const form = document.getElementById('contributeForm');
    if (!form.checkValidity()) { form.reportValidity(); return; }
    const goalId = document.getElementById('contributeGoalId').value;
    const amount = document.getElementById('contributeAmount').value;
    UI.showLoading();
    try {
      await Api.post(`/savings-goals/${goalId}/contribute?userId=${Api.getUserId()}&amount=${amount}`, null);
      UI.showToast('Contribution added!');
      contributeModal.hide();
      loadData();
    } catch (err) { UI.showToast(err.message, 'error'); }
    finally { UI.hideLoading(); }
  }

  async function saveGoal() {
    const form = document.getElementById('goalForm');
    if (!form.checkValidity()) { form.reportValidity(); return; }
    const id = document.getElementById('goalId').value;
    const payload = {
      name: document.getElementById('goalName').value,
      targetAmount: document.getElementById('targetAmount').value,
      savedAmount: document.getElementById('savedAmount').value,
      startDate: document.getElementById('startDate').value,
      targetDate: document.getElementById('targetDate').value,
      description: document.getElementById('goalDesc').value,
      status: document.getElementById('goalStatus').value
    };
    UI.showLoading();
    try {
      if (id) { await Api.put(`/savings-goals/${id}?userId=${Api.getUserId()}`, payload); UI.showToast('Goal updated!'); }
      else { await Api.post(`/savings-goals?userId=${Api.getUserId()}`, payload); UI.showToast('Goal created!'); }
      goalModal.hide();
      loadData();
    } catch (err) { UI.showToast(err.message, 'error'); }
    finally { UI.hideLoading(); }
  }

  async function deleteGoal(id) {
    if (!confirm('Delete this savings goal?')) return;
    UI.showLoading();
    try {
      await Api.del(`/savings-goals/${id}?userId=${Api.getUserId()}`);
      UI.showToast('Goal deleted.'); loadData();
    } catch (err) { UI.showToast(err.message, 'error'); }
    finally { UI.hideLoading(); }
  }

  loadData();
</script>
</body>
</html>
