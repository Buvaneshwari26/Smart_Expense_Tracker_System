<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — Smart Expense Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="css/globals.css"/>
</head>
<body>
<button class="sidebar-toggle d-md-none"><i class="bi bi-list"></i></button>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo-icon"><i class="bi bi-wallet2"></i></div>
      <span class="brand-text">ExpenseTracker</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link"><i class="bi bi-grid-1x2"></i><span>Dashboard</span></a>
      <a href="income.html" class="nav-link"><i class="bi bi-cash-stack"></i><span>Income</span></a>
      <a href="expense.html" class="nav-link"><i class="bi bi-credit-card"></i><span>Expenses</span></a>
      <a href="category.html" class="nav-link"><i class="bi bi-tags"></i><span>Categories</span></a>
      <a href="budget.html" class="nav-link"><i class="bi bi-pie-chart"></i><span>Budgets</span></a>
      <a href="savings.html" class="nav-link"><i class="bi bi-piggy-bank"></i><span>Savings Goals</span></a>
      <a href="reports.html" class="nav-link"><i class="bi bi-graph-up"></i><span>Reports</span></a>
      <a href="profile.html" class="nav-link"><i class="bi bi-person-circle"></i><span>Profile</span></a>
    </nav>
    <div class="sidebar-footer">
      <span id="sidebar-username">User</span>
      <button onclick="Auth.logout()" class="btn btn-sm btn-outline-danger"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </div>
  </aside>
  <main class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h2 class="mb-1">My Profile</h2>
        <p class="text-secondary">Manage your account settings</p>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-md-6">
        <div class="glass-card mb-4">
          <h5 class="mb-4">Profile Information</h5>
          <form id="profileForm" class="glass-form">
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" id="fullName" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" class="form-control" id="username" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control text-secondary" id="email" disabled>
              <div class="form-text text-secondary"><i class="bi bi-info-circle"></i> Email cannot be changed</div>
            </div>
            <div class="mb-4">
              <label class="form-label">Phone Number</label>
              <input type="text" class="form-control" id="phone">
            </div>
            <button type="button" class="btn btn-glow w-100" onclick="updateProfile()">Save Changes</button>
          </form>
        </div>
      </div>

      <div class="col-md-6">
        <div class="glass-card mb-4">
          <h5 class="mb-4">Change Password</h5>
          <form id="passwordForm" class="glass-form">
            <div class="mb-3">
              <label class="form-label">Current Password</label>
              <input type="password" class="form-control" id="currentPassword" required>
            </div>
            <div class="mb-3">
              <label class="form-label">New Password</label>
              <input type="password" class="form-control" id="newPassword" required>
            </div>
            <div class="mb-4">
              <label class="form-label">Confirm New Password</label>
              <input type="password" class="form-control" id="confirmPassword" required>
            </div>
            <button type="button" class="btn btn-outline-warning w-100" onclick="changePassword()">Update Password</button>
          </form>
        </div>

        <div class="glass-card">
          <h5 class="mb-4 text-danger">Danger Zone</h5>
          <p class="text-secondary mb-4">Once you delete your account, there is no going back. Please be certain.</p>
          <button class="btn btn-danger w-100" onclick="deleteAccount()"><i class="bi bi-trash me-2"></i>Delete Account</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script>
  Auth.requireAuth();
  UI.initSidebar();

  async function loadProfile() {
    UI.showLoading();
    try {
      const data = await Api.get(`/users/${Api.getUserId()}`);
      document.getElementById('fullName').value = data.fullName || '';
      document.getElementById('username').value = data.username || '';
      document.getElementById('email').value = data.email || '';
      document.getElementById('phone').value = data.phoneNumber || '';
    } catch (err) {
      UI.showToast('Failed to load profile: ' + err.message, 'error');
    } finally {
      UI.hideLoading();
    }
  }

  async function updateProfile() {
    const form = document.getElementById('profileForm');
    if(!form.checkValidity()) { form.reportValidity(); return; }

    UI.showLoading();
    try {
      const payload = {
        fullName: document.getElementById('fullName').value,
        username: document.getElementById('username').value,
        phoneNumber: document.getElementById('phone').value
      };
      await Api.put(`/users/${Api.getUserId()}`, payload);
      UI.showToast('Profile updated successfully');
      
      // Update local storage username
      localStorage.setItem('username', payload.username);
      document.getElementById('sidebar-username').textContent = payload.username;
    } catch (err) {
      UI.showToast(err.message, 'error');
    } finally {
      UI.hideLoading();
    }
  }

  async function changePassword() {
    const form = document.getElementById('passwordForm');
    if(!form.checkValidity()) { form.reportValidity(); return; }

    const curr = document.getElementById('currentPassword').value;
    const newPw = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;

    if(newPw !== confirm) {
      UI.showToast('New passwords do not match', 'error');
      return;
    }

    UI.showLoading();
    try {
      // We'll use PATCH method with request params as defined in the controller
      await Api.patch(`/users/${Api.getUserId()}/change-password?currentPassword=${encodeURIComponent(curr)}&newPassword=${encodeURIComponent(newPw)}`);
      UI.showToast('Password changed successfully');
      form.reset();
    } catch (err) {
      UI.showToast(err.message, 'error');
    } finally {
      UI.hideLoading();
    }
  }

  async function deleteAccount() {
    // Only Admin can delete users per the controller, so we simulate this or just call it 
    // Wait, the API requires ROLE_ADMIN. We should show a warning if they are not admin.
    const role = localStorage.getItem('role');
    if(role !== 'ADMIN') {
      UI.showToast('Only administrators can delete accounts', 'error');
      return;
    }
    
    if(!confirm('Are you ABSOLUTELY sure? This action cannot be undone.')) return;
    
    UI.showLoading();
    try {
      await Api.del(`/users/${Api.getUserId()}`);
      alert('Account deleted. You will be logged out.');
      Auth.logout();
    } catch (err) {
      UI.showToast(err.message, 'error');
      UI.hideLoading();
    }
  }

  loadProfile();
</script>
</body>
</html>
