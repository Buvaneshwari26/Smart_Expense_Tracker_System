<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Income — Smart Expense Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="css/globals.css"/>
</head>
<body>
<button class="sidebar-toggle d-md-none"><i class="bi bi-list"></i></button>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo-icon"><i class="bi bi-wallet2"></i></div>
      <span class="brand-text">ExpenseTracker</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link"><i class="bi bi-grid-1x2"></i><span>Dashboard</span></a>
      <a href="income.html" class="nav-link"><i class="bi bi-cash-stack"></i><span>Income</span></a>
      <a href="expense.html" class="nav-link"><i class="bi bi-credit-card"></i><span>Expenses</span></a>
      <a href="category.html" class="nav-link"><i class="bi bi-tags"></i><span>Categories</span></a>
      <a href="budget.html" class="nav-link"><i class="bi bi-pie-chart"></i><span>Budgets</span></a>
      <a href="savings.html" class="nav-link"><i class="bi bi-piggy-bank"></i><span>Savings Goals</span></a>
      <a href="reports.html" class="nav-link"><i class="bi bi-graph-up"></i><span>Reports</span></a>
      <a href="profile.html" class="nav-link"><i class="bi bi-person-circle"></i><span>Profile</span></a>
    </nav>
    <div class="sidebar-footer">
      <span id="sidebar-username">User</span>
      <button onclick="Auth.logout()" class="btn btn-sm btn-outline-danger logout-btn"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </div>
  </aside>
  <main class="main-content">
    <!-- Header injected by UI.initHeader() -->

    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h2 class="mb-1">Income Management</h2>
        <p class="text-secondary mb-0">Track your earnings and revenue sources</p>
      </div>
      <button class="btn btn-glow" onclick="openModal()"><i class="bi bi-plus-lg me-2"></i>Add Income</button>
    </div>

    <!-- Advanced Filter Panel -->
    <div class="glass-card mb-4">
      <form id="searchForm" class="row g-3 align-items-end glass-form">
        <div class="col-md-3">
          <label class="form-label"><i class="bi bi-search me-1"></i>Keyword / Source</label>
          <input type="text" class="form-control" id="searchKeyword" placeholder="Search source or description...">
        </div>
        <div class="col-md-2">
          <label class="form-label"><i class="bi bi-tags me-1"></i>Category</label>
          <select class="form-select" id="searchCategory"><option value="">All</option></select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Start Date</label>
          <input type="date" class="form-control" id="searchStart">
        </div>
        <div class="col-md-2">
          <label class="form-label">End Date</label>
          <input type="date" class="form-control" id="searchEnd">
        </div>
        <div class="col-md-1">
          <label class="form-label">Min ₹</label>
          <input type="number" class="form-control" id="searchMin" placeholder="0">
        </div>
        <div class="col-md-1">
          <label class="form-label">Max ₹</label>
          <input type="number" class="form-control" id="searchMax" placeholder="∞">
        </div>
        <div class="col-md-1 d-flex gap-2">
          <button type="button" class="btn btn-glow w-50" onclick="loadData(0)" title="Search"><i class="bi bi-search"></i></button>
          <button type="button" class="btn btn-outline-secondary w-50" onclick="resetSearch()" title="Clear"><i class="bi bi-x"></i></button>
        </div>
      </form>
      <!-- Sort Controls -->
      <div class="d-flex align-items-center gap-3 mt-3 pt-3" style="border-top:1px solid var(--glass-border);">
        <div class="d-flex align-items-center gap-2">
          <label class="form-label mb-0 text-secondary" style="white-space:nowrap;font-size:0.85rem;">Sort By:</label>
          <select class="form-select form-select-sm" id="sortBy" style="width:auto;" onchange="loadData(0)">
            <option value="date">Date</option>
            <option value="amount">Amount</option>
            <option value="source">Source</option>
          </select>
          <select class="form-select form-select-sm" id="sortDir" style="width:auto;" onchange="loadData(0)">
            <option value="desc">Newest First</option>
            <option value="asc">Oldest First</option>
          </select>
        </div>
        <div class="d-flex align-items-center gap-2 ms-auto">
          <label class="form-label mb-0 text-secondary" style="font-size:0.85rem;">Per page:</label>
          <select class="form-select form-select-sm" id="pageSize" style="width:auto;" onchange="loadData(0)">
            <option value="10">10</option>
            <option value="25">25</option>
            <option value="50">50</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Export Buttons -->
    <div class="glass-card mb-4 d-flex flex-wrap gap-2 align-items-center py-3">
      <span class="text-secondary me-2" style="font-size:0.85rem;"><i class="bi bi-download me-1"></i>Export:</span>
      <button class="btn btn-outline-success btn-sm" onclick="Api.download(`/incomes/export/excel?userId=${Api.getUserId()}`, 'incomes.xlsx')"><i class="bi bi-file-earmark-excel me-1"></i>Excel</button>
      <button class="btn btn-outline-info btn-sm" onclick="Api.download(`/incomes/export/csv?userId=${Api.getUserId()}`, 'incomes.csv')"><i class="bi bi-filetype-csv me-1"></i>CSV</button>
      <span class="ms-auto text-secondary" style="font-size:0.8rem;" id="result-count"></span>
    </div>

    <!-- Data Table -->
    <div class="glass-card">
      <div class="table-responsive">
        <table class="glass-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Source</th>
              <th>Category</th>
              <th>Amount</th>
              <th>Description</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <div id="empty-state-container"></div>
      <div id="pagination" class="mt-4 d-flex justify-content-end"></div>
    </div>
  </main>
</div>

<!-- Add/Edit Modal -->
<div class="modal fade" id="itemModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-glass">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="modalTitle">Add Income</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-0">
        <form id="itemForm" class="glass-form">
          <input type="hidden" id="itemId">
          <div class="mb-3">
            <label class="form-label">Source</label>
            <input type="text" class="form-control" id="source" required placeholder="e.g. Salary, Freelance...">
          </div>
          <div class="mb-3">
            <label class="form-label">Amount (₹)</label>
            <input type="number" step="0.01" class="form-control" id="amount" required placeholder="0.00">
          </div>
          <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date" class="form-control" id="date" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Category</label>
            <select class="form-select" id="categoryId" required><option value="">Select Category</option></select>
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="description" rows="2" placeholder="Additional notes..."></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-glow" onclick="saveItem()"><i class="bi bi-check-lg me-1"></i>Save Income</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script>
  Auth.requireAuth();
  UI.initSidebar();
  UI.initHeader();
  let myModal = new bootstrap.Modal(document.getElementById('itemModal'));
  let categories = [];

  async function loadCategories() {
    try {
      const data = await Api.get(`/categories?userId=${Api.getUserId()}`);
      categories = data.filter(c => c.type === 'INCOME');
      const opts = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      document.getElementById('categoryId').innerHTML = '<option value="">Select Category</option>' + opts;
      document.getElementById('searchCategory').innerHTML = '<option value="">All Categories</option>' + opts;
    } catch (err) { console.error('Failed to load categories', err); }
  }

  function resetSearch() {
    document.getElementById('searchForm').reset();
    document.getElementById('sortBy').value = 'date';
    document.getElementById('sortDir').value = 'desc';
    document.getElementById('pageSize').value = '10';
    loadData(0);
  }

  async function loadData(page = 0) {
    const tbody = document.getElementById('table-body');
    const emptyContainer = document.getElementById('empty-state-container');
    UI.showSkeletonTable(tbody, 5, 6);
    emptyContainer.innerHTML = '';
    try {
      const keyword = document.getElementById('searchKeyword').value;
      const cat = document.getElementById('searchCategory').value;
      const start = document.getElementById('searchStart').value;
      const end = document.getElementById('searchEnd').value;
      const minAmt = document.getElementById('searchMin').value;
      const maxAmt = document.getElementById('searchMax').value;
      const sortBy = document.getElementById('sortBy').value;
      const sortDir = document.getElementById('sortDir').value;
      const size = document.getElementById('pageSize').value;

      let url = `/incomes/search?userId=${Api.getUserId()}&page=${page}&size=${size}&sortBy=${sortBy}&sortDir=${sortDir}`;
      if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;
      if (cat) url += `&categoryId=${cat}`;
      if (start) url += `&startDate=${start}`;
      if (end) url += `&endDate=${end}`;
      if (minAmt) url += `&minAmount=${minAmt}`;
      if (maxAmt) url += `&maxAmount=${maxAmt}`;

      const data = await Api.get(url);
      tbody.innerHTML = '';

      const countEl = document.getElementById('result-count');
      if (countEl) countEl.textContent = `${data.totalElements || 0} records found`;

      if (data.content && data.content.length > 0) {
        data.content.forEach(item => {
          tbody.innerHTML += `
            <tr class="animate-in">
              <td>${UI.formatDate(item.date)}</td>
              <td><span class="fw-500">${item.source || '—'}</span></td>
              <td><span class="badge income">${item.categoryName}</span></td>
              <td class="fw-bold" style="color:var(--income-green);">+${UI.formatCurrency(item.amount)}</td>
              <td>${item.description || '<span class="text-secondary">—</span>'}</td>
              <td>
                <button class="btn btn-sm btn-outline-info me-1" onclick='editItem(${JSON.stringify(item)})' title="Edit"><i class="bi bi-pencil"></i></button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteItem(${item.id})" title="Delete"><i class="bi bi-trash"></i></button>
              </td>
            </tr>
          `;
        });
      } else {
        UI.renderEmptyState(emptyContainer, 'No Income Records Found', 'Start logging your first income entry.', 'bi-cash-stack', 'Add Income', openModal);
      }
      UI.renderPagination(document.getElementById('pagination'), data, loadData);
    } catch (err) { UI.showToast(err.message, 'error'); }
  }

  function openModal() {
    document.getElementById('itemForm').reset();
    document.getElementById('itemId').value = '';
    document.getElementById('date').valueAsDate = new Date();
    document.getElementById('modalTitle').textContent = 'Add Income';
    myModal.show();
  }

  function editItem(item) {
    document.getElementById('itemId').value = item.id;
    document.getElementById('source').value = item.source || '';
    document.getElementById('amount').value = item.amount;
    document.getElementById('date').value = item.date;
    document.getElementById('categoryId').value = item.categoryId;
    document.getElementById('description').value = item.description || '';
    document.getElementById('modalTitle').textContent = 'Edit Income';
    myModal.show();
  }

  async function saveItem() {
    const form = document.getElementById('itemForm');
    if (!form.checkValidity()) { form.reportValidity(); return; }
    const id = document.getElementById('itemId').value;
    const payload = {
      source: document.getElementById('source').value,
      amount: document.getElementById('amount').value,
      date: document.getElementById('date').value,
      categoryId: document.getElementById('categoryId').value,
      description: document.getElementById('description').value
    };
    UI.showLoading();
    try {
      if (id) { await Api.put(`/incomes/${id}?userId=${Api.getUserId()}`, payload); UI.showToast('Income updated!'); }
      else { await Api.post(`/incomes?userId=${Api.getUserId()}`, payload); UI.showToast('Income added!'); }
      myModal.hide();
      loadData(0);
    } catch (err) { UI.showToast(err.message, 'error'); }
    finally { UI.hideLoading(); }
  }

  async function deleteItem(id) {
    if (!confirm('Delete this income record?')) return;
    UI.showLoading();
    try {
      await Api.del(`/incomes/${id}?userId=${Api.getUserId()}`);
      UI.showToast('Income deleted.'); loadData(0);
    } catch (err) { UI.showToast(err.message, 'error'); }
    finally { UI.hideLoading(); }
  }

  loadCategories().then(() => loadData(0));
</script>
</body>
</html>
