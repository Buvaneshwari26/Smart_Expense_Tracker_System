<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reports & Analytics — Smart Expense Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="css/globals.css"/>
</head>
<body>
<button class="sidebar-toggle d-md-none"><i class="bi bi-list"></i></button>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo-icon"><i class="bi bi-wallet2"></i></div>
      <span class="brand-text">ExpenseTracker</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link"><i class="bi bi-grid-1x2"></i><span>Dashboard</span></a>
      <a href="income.html" class="nav-link"><i class="bi bi-cash-stack"></i><span>Income</span></a>
      <a href="expense.html" class="nav-link"><i class="bi bi-credit-card"></i><span>Expenses</span></a>
      <a href="category.html" class="nav-link"><i class="bi bi-tags"></i><span>Categories</span></a>
      <a href="budget.html" class="nav-link"><i class="bi bi-pie-chart"></i><span>Budgets</span></a>
      <a href="savings.html" class="nav-link"><i class="bi bi-piggy-bank"></i><span>Savings Goals</span></a>
      <a href="reports.html" class="nav-link"><i class="bi bi-graph-up"></i><span>Reports</span></a>
      <a href="profile.html" class="nav-link"><i class="bi bi-person-circle"></i><span>Profile</span></a>
    </nav>
    <div class="sidebar-footer">
      <span id="sidebar-username">User</span>
      <button onclick="Auth.logout()" class="btn btn-sm btn-outline-danger"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </div>
  </aside>
  <main class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h2 class="mb-1">Reports & Analytics</h2>
        <p class="text-secondary">Visualize your financial data</p>
      </div>
      <div>
        <button class="btn btn-outline-danger" onclick="Api.download(`/expenses/export/pdf?userId=${Api.getUserId()}`, 'expense-report.pdf')"><i class="bi bi-file-earmark-pdf me-2"></i>Export PDF</button>
      </div>
    </div>

    <div class="glass-card mb-4">
      <form id="reportForm" class="row g-3 align-items-end glass-form">
        <div class="col-md-3">
          <label class="form-label">Report Type</label>
          <select class="form-select" id="reportType">
            <option value="monthly">Monthly Summary</option>
            <option value="yearly">Yearly Overview</option>
            <option value="category">Category Breakdown</option>
            <option value="incomeVsExpense">Income vs Expense</option>
          </select>
        </div>
        <div class="col-md-2" id="monthCol">
          <label class="form-label">Month</label>
          <input type="number" min="1" max="12" class="form-control" id="month">
        </div>
        <div class="col-md-2">
          <label class="form-label">Year</label>
          <input type="number" min="2000" class="form-control" id="year">
        </div>
        <div class="col-md-2">
          <button type="button" class="btn btn-glow w-100" onclick="generateReport()">Generate</button>
        </div>
      </form>
    </div>

    <div class="row g-4 mb-4" id="reportSummaryCards">
      <!-- Populated by JS -->
    </div>

    <div class="glass-card">
      <div class="chart-container" style="height:400px">
        <canvas id="reportChart"></canvas>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script>
  Auth.requireAuth();
  UI.initSidebar();
  let currentChart = null;

  // Init date inputs
  const now = new Date();
  document.getElementById('month').value = now.getMonth() + 1;
  document.getElementById('year').value = now.getFullYear();

  document.getElementById('reportType').addEventListener('change', function() {
    const type = this.value;
    document.getElementById('monthCol').style.display = (type === 'yearly' || type === 'incomeVsExpense') ? 'none' : 'block';
  });

  async function generateReport() {
    UI.showLoading();
    try {
      const type = document.getElementById('reportType').value;
      const month = document.getElementById('month').value;
      const year = document.getElementById('year').value;
      let url = '';

      switch(type) {
        case 'monthly': url = `/reports/monthly?userId=${Api.getUserId()}&month=${month}&year=${year}`; break;
        case 'yearly': url = `/reports/yearly?userId=${Api.getUserId()}&year=${year}`; break;
        case 'category': url = `/reports/category?userId=${Api.getUserId()}&month=${month}&year=${year}`; break;
        case 'incomeVsExpense': url = `/reports/income-vs-expense?userId=${Api.getUserId()}&year=${year}`; break;
      }

      const data = await Api.get(url);
      renderReport(type, data);
    } catch (err) {
      UI.showToast(err.message, 'error');
    } finally {
      UI.hideLoading();
    }
  }

  function renderReport(type, data) {
    if(currentChart) currentChart.destroy();
    const ctx = document.getElementById('reportChart').getContext('2d');
    Chart.defaults.color = '#8892a4';
    Chart.defaults.borderColor = 'rgba(255,255,255,0.05)';

    const cardsContainer = document.getElementById('reportSummaryCards');
    cardsContainer.innerHTML = '';

    if(type === 'monthly' || type === 'yearly') {
      cardsContainer.innerHTML = `
        <div class="col-md-4"><div class="glass-card"><div class="text-secondary mb-1">Total Income</div><h3 class="text-success">+${UI.formatCurrency(data.totalIncome)}</h3></div></div>
        <div class="col-md-4"><div class="glass-card"><div class="text-secondary mb-1">Total Expense</div><h3 class="text-danger">-${UI.formatCurrency(data.totalExpense)}</h3></div></div>
        <div class="col-md-4"><div class="glass-card"><div class="text-secondary mb-1">Balance</div><h3 class="text-info">${UI.formatCurrency(data.balance)}</h3></div></div>
      `;
    }

    if(type === 'monthly') {
      const labels = data.categoryBreakdown.map(c => c.category);
      const values = data.categoryBreakdown.map(c => c.amount);
      currentChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{ label: 'Expenses by Category', data: values, backgroundColor: 'rgba(233, 69, 96, 0.7)' }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });
    } else if (type === 'yearly' || type === 'incomeVsExpense') {
      const sourceData = type === 'yearly' ? data.monthlyData : data.data;
      const labels = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const incomes = sourceData.map(m => m.income);
      const expenses = sourceData.map(m => m.expense);
      currentChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [
            { label: 'Income', data: incomes, borderColor: '#4ecca3', backgroundColor: 'rgba(78, 204, 163, 0.1)', fill: true, tension: 0.4 },
            { label: 'Expense', data: expenses, borderColor: '#e94560', backgroundColor: 'rgba(233, 69, 96, 0.1)', fill: true, tension: 0.4 }
          ]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });
    } else if (type === 'category') {
      const labels = data.categories.map(c => c.category);
      const values = data.categories.map(c => c.totalSpent);
      currentChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels,
          datasets: [{
            data: values,
            borderWidth: 0,
            backgroundColor: ['#e94560', '#f5a623', '#4ecca3', '#3b82f6', '#9b5de5', '#00bbf9', '#00f5d4']
          }]
        },
        options: { responsive: true, maintainAspectRatio: false, cutout: '60%', plugins: { legend: { position: 'right' } } }
      });
    }
  }

  // Initial load
  generateReport();
</script>
</body>
</html>
