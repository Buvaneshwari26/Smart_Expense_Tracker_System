<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Budgets — Smart Expense Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="css/globals.css"/>
</head>
<body>
<button class="sidebar-toggle d-md-none"><i class="bi bi-list"></i></button>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo-icon"><i class="bi bi-wallet2"></i></div>
      <span class="brand-text">ExpenseTracker</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link"><i class="bi bi-grid-1x2"></i><span>Dashboard</span></a>
      <a href="income.html" class="nav-link"><i class="bi bi-cash-stack"></i><span>Income</span></a>
      <a href="expense.html" class="nav-link"><i class="bi bi-credit-card"></i><span>Expenses</span></a>
      <a href="category.html" class="nav-link"><i class="bi bi-tags"></i><span>Categories</span></a>
      <a href="budget.html" class="nav-link"><i class="bi bi-pie-chart"></i><span>Budgets</span></a>
      <a href="savings.html" class="nav-link"><i class="bi bi-piggy-bank"></i><span>Savings Goals</span></a>
      <a href="reports.html" class="nav-link"><i class="bi bi-graph-up"></i><span>Reports</span></a>
      <a href="profile.html" class="nav-link"><i class="bi bi-person-circle"></i><span>Profile</span></a>
    </nav>
    <div class="sidebar-footer">
      <span id="sidebar-username">User</span>
      <button onclick="Auth.logout()" class="btn btn-sm btn-outline-danger"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </div>
  </aside>
  <main class="main-content">
    <!-- Header injected by UI.initHeader() -->

    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h2 class="mb-1">Budget Management</h2>
        <p class="text-secondary mb-0">Set and monitor spending limits by category</p>
      </div>
      <button class="btn btn-glow" onclick="openModal()"><i class="bi bi-plus-lg me-2"></i>Create Budget</button>
    </div>

    <!-- Month Filter -->
    <div class="glass-card mb-4 d-flex flex-wrap gap-3 align-items-center py-3">
      <div class="d-flex align-items-center gap-2">
        <label class="form-label mb-0 text-secondary">Month:</label>
        <input type="month" class="form-control form-control-sm" id="monthPicker" style="width:180px;" onchange="loadData()">
      </div>
      <div class="ms-auto d-flex gap-2">
        <div class="glass-card py-2 px-3 text-center" style="min-width:110px;">
          <div class="fw-bold" id="summary-total" style="color:var(--accent);">₹0</div>
          <div class="text-secondary" style="font-size:0.75rem;">Total Budget</div>
        </div>
        <div class="glass-card py-2 px-3 text-center" style="min-width:110px;">
          <div class="fw-bold" id="summary-spent" style="color:var(--expense-red);">₹0</div>
          <div class="text-secondary" style="font-size:0.75rem;">Total Spent</div>
        </div>
        <div class="glass-card py-2 px-3 text-center" style="min-width:110px;">
          <div class="fw-bold" id="summary-remaining" style="color:var(--income-green);">₹0</div>
          <div class="text-secondary" style="font-size:0.75rem;">Remaining</div>
        </div>
      </div>
    </div>

    <!-- Budget Cards Grid -->
    <div id="budget-grid" class="row g-3"></div>
    <div id="empty-state-container"></div>
  </main>
</div>

<!-- Add/Edit Modal -->
<div class="modal fade" id="budgetModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-glass">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="modalTitle">Create Budget</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-0">
        <form id="budgetForm" class="glass-form">
          <input type="hidden" id="budgetId">
          <div class="mb-3">
            <label class="form-label">Category</label>
            <select class="form-select" id="categoryId" required><option value="">Select Category</option></select>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label">Month</label>
              <select class="form-select" id="budgetMonth" required>
                <option value="1">January</option><option value="2">February</option>
                <option value="3">March</option><option value="4">April</option>
                <option value="5">May</option><option value="6">June</option>
                <option value="7">July</option><option value="8">August</option>
                <option value="9">September</option><option value="10">October</option>
                <option value="11">November</option><option value="12">December</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label">Year</label>
              <input type="number" class="form-control" id="budgetYear" required min="2020" max="2099">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Budget Amount (₹)</label>
            <input type="number" step="0.01" class="form-control" id="budgetAmount" required placeholder="0.00">
          </div>
          <div class="mb-3">
            <label class="form-label">Alert Threshold (%)</label>
            <input type="number" class="form-control" id="alertThreshold" value="80" min="1" max="100">
            <small class="text-secondary">Get alerted when spending exceeds this %</small>
          </div>
        </form>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-glow" onclick="saveBudget()"><i class="bi bi-check-lg me-1"></i>Save Budget</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script>
  Auth.requireAuth();
  UI.initSidebar();
  UI.initHeader();
  let myModal = new bootstrap.Modal(document.getElementById('budgetModal'));

  // Set current month
  const now = new Date();
  document.getElementById('monthPicker').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  async function loadCategories() {
    try {
      const data = await Api.get(`/categories?userId=${Api.getUserId()}`);
      const expCats = data.filter(c => c.type === 'EXPENSE');
      const opts = expCats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      document.getElementById('categoryId').innerHTML = '<option value="">Select Category</option>' + opts;
    } catch (err) { console.error(err); }
  }

  async function loadData() {
    const grid = document.getElementById('budget-grid');
    const emptyContainer = document.getElementById('empty-state-container');
    grid.innerHTML = Array(6).fill('<div class="col-md-4"><div class="glass-card skeleton-loader" style="height:200px;"></div></div>').join('');
    emptyContainer.innerHTML = '';

    const monthVal = document.getElementById('monthPicker').value;
    const [year, month] = monthVal.split('-').map(Number);

    try {
      const budgets = await Api.get(`/budgets?userId=${Api.getUserId()}&month=${month}&year=${year}`);
      grid.innerHTML = '';

      let totalBudget = 0, totalSpent = 0;

      if (!budgets || budgets.length === 0) {
        UI.renderEmptyState(emptyContainer, 'No Budgets Found', 'Create your first budget for this month.', 'bi-pie-chart', 'Create Budget', openModal);
        updateSummary(0, 0);
        return;
      }

      budgets.forEach(b => {
        totalBudget += b.budgetAmount || 0;
        totalSpent += b.spentAmount || 0;
        const spent = b.spentAmount || 0;
        const limit = b.budgetAmount || 1;
        const pct = Math.min(100, Math.round((spent / limit) * 100));
        const threshold = b.alertThreshold || 80;
        const isOver = pct >= 100;
        const isAlert = pct >= threshold && !isOver;
        const barColor = isOver ? 'var(--expense-red)' : isAlert ? 'var(--warning)' : 'var(--accent)';
        const statusBadge = isOver
          ? `<span class="badge" style="background:#e9456033;color:var(--expense-red);">⚠ Over Budget</span>`
          : isAlert
          ? `<span class="badge" style="background:#f5a62333;color:var(--warning);">⚡ Alert</span>`
          : `<span class="badge" style="background:#4ecca333;color:var(--income-green);">✓ On Track</span>`;

        grid.innerHTML += `
          <div class="col-md-6 col-lg-4 animate-in">
            <div class="glass-card h-100">
              <div class="d-flex justify-content-between align-items-start mb-3">
                <div>
                  <div class="fw-600 mb-1">${b.categoryName}</div>
                  ${statusBadge}
                </div>
                <div class="d-flex gap-1">
                  <button class="btn btn-sm btn-outline-info" onclick='editBudget(${JSON.stringify(b)})' title="Edit"><i class="bi bi-pencil"></i></button>
                  <button class="btn btn-sm btn-outline-danger" onclick="deleteBudget(${b.id})" title="Delete"><i class="bi bi-trash"></i></button>
                </div>
              </div>
              <div class="d-flex justify-content-between mb-2">
                <span class="text-secondary" style="font-size:0.82rem;">Spent</span>
                <span class="fw-600" style="color:${barColor};">${UI.formatCurrency(spent)} / ${UI.formatCurrency(limit)}</span>
              </div>
              <div class="progress-bar-custom mb-2">
                <div class="progress-bar-fill" style="width:${pct}%;background:${barColor};"></div>
              </div>
              <div class="d-flex justify-content-between">
                <span class="text-secondary" style="font-size:0.75rem;">${pct}% used</span>
                <span class="text-secondary" style="font-size:0.75rem;">Remaining: ${UI.formatCurrency(Math.max(0, limit - spent))}</span>
              </div>
            </div>
          </div>
        `;
      });
      updateSummary(totalBudget, totalSpent);
    } catch (err) { UI.showToast(err.message, 'error'); }
  }

  function updateSummary(total, spent) {
    document.getElementById('summary-total').textContent = UI.formatCurrency(total);
    document.getElementById('summary-spent').textContent = UI.formatCurrency(spent);
    document.getElementById('summary-remaining').textContent = UI.formatCurrency(Math.max(0, total - spent));
  }

  function openModal() {
    document.getElementById('budgetForm').reset();
    document.getElementById('budgetId').value = '';
    const now = new Date();
    document.getElementById('budgetMonth').value = now.getMonth() + 1;
    document.getElementById('budgetYear').value = now.getFullYear();
    document.getElementById('alertThreshold').value = 80;
    document.getElementById('modalTitle').textContent = 'Create Budget';
    myModal.show();
  }

  function editBudget(b) {
    document.getElementById('budgetId').value = b.id;
    document.getElementById('categoryId').value = b.categoryId;
    document.getElementById('budgetMonth').value = b.month;
    document.getElementById('budgetYear').value = b.year;
    document.getElementById('budgetAmount').value = b.budgetAmount;
    document.getElementById('alertThreshold').value = b.alertThreshold || 80;
    document.getElementById('modalTitle').textContent = 'Edit Budget';
    myModal.show();
  }

  async function saveBudget() {
    const form = document.getElementById('budgetForm');
    if (!form.checkValidity()) { form.reportValidity(); return; }
    const id = document.getElementById('budgetId').value;
    const payload = {
      categoryId: document.getElementById('categoryId').value,
      month: document.getElementById('budgetMonth').value,
      year: document.getElementById('budgetYear').value,
      budgetAmount: document.getElementById('budgetAmount').value,
      alertThreshold: document.getElementById('alertThreshold').value
    };
    UI.showLoading();
    try {
      if (id) { await Api.put(`/budgets/${id}?userId=${Api.getUserId()}`, payload); UI.showToast('Budget updated!'); }
      else { await Api.post(`/budgets?userId=${Api.getUserId()}`, payload); UI.showToast('Budget created!'); }
      myModal.hide();
      loadData();
    } catch (err) { UI.showToast(err.message, 'error'); }
    finally { UI.hideLoading(); }
  }

  async function deleteBudget(id) {
    if (!confirm('Delete this budget?')) return;
    UI.showLoading();
    try {
      await Api.del(`/budgets/${id}?userId=${Api.getUserId()}`);
      UI.showToast('Budget deleted.'); loadData();
    } catch (err) { UI.showToast(err.message, 'error'); }
    finally { UI.hideLoading(); }
  }

  loadCategories().then(() => loadData());
</script>
</body>
</html>
