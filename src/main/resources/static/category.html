<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Categories — Smart Expense Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="css/globals.css"/>
</head>
<body>
<button class="sidebar-toggle d-md-none"><i class="bi bi-list"></i></button>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo-icon"><i class="bi bi-wallet2"></i></div>
      <span class="brand-text">ExpenseTracker</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link"><i class="bi bi-grid-1x2"></i><span>Dashboard</span></a>
      <a href="income.html" class="nav-link"><i class="bi bi-cash-stack"></i><span>Income</span></a>
      <a href="expense.html" class="nav-link"><i class="bi bi-credit-card"></i><span>Expenses</span></a>
      <a href="category.html" class="nav-link"><i class="bi bi-tags"></i><span>Categories</span></a>
      <a href="budget.html" class="nav-link"><i class="bi bi-pie-chart"></i><span>Budgets</span></a>
      <a href="savings.html" class="nav-link"><i class="bi bi-piggy-bank"></i><span>Savings Goals</span></a>
      <a href="reports.html" class="nav-link"><i class="bi bi-graph-up"></i><span>Reports</span></a>
      <a href="profile.html" class="nav-link"><i class="bi bi-person-circle"></i><span>Profile</span></a>
    </nav>
    <div class="sidebar-footer">
      <span id="sidebar-username">User</span>
      <button onclick="Auth.logout()" class="btn btn-sm btn-outline-danger logout-btn"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </div>
  </aside>
  <main class="main-content">
    <!-- Header injected by UI.initHeader() -->

    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h2 class="mb-1">Categories</h2>
        <p class="text-secondary mb-0">Organise income and expense categories</p>
      </div>
      <button class="btn btn-glow" onclick="openModal()"><i class="bi bi-plus-lg me-2"></i>Add Category</button>
    </div>

    <!-- Filter Tabs -->
    <div class="glass-card mb-4 d-flex gap-2 align-items-center flex-wrap py-3">
      <button class="btn btn-sm filter-tab active" data-type="" onclick="filterType('', this)">All</button>
      <button class="btn btn-sm filter-tab" data-type="INCOME" onclick="filterType('INCOME', this)"><i class="bi bi-arrow-up-circle me-1"></i>Income</button>
      <button class="btn btn-sm filter-tab" data-type="EXPENSE" onclick="filterType('EXPENSE', this)"><i class="bi bi-arrow-down-circle me-1"></i>Expense</button>
      <div class="ms-auto">
        <input type="text" class="form-control form-control-sm" id="searchInput" placeholder="Search categories..." onkeyup="filterSearch()" style="width:200px;">
      </div>
    </div>

    <!-- Category Grid -->
    <div id="category-grid" class="row g-3"></div>
    <div id="empty-state-container"></div>
  </main>
</div>

<!-- Add/Edit Modal -->
<div class="modal fade" id="catModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-glass">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="modalTitle">Add Category</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-0">
        <form id="catForm" class="glass-form">
          <input type="hidden" id="catId">
          <div class="mb-3">
            <label class="form-label">Category Name</label>
            <input type="text" class="form-control" id="catName" required placeholder="e.g. Food & Dining">
          </div>
          <div class="mb-3">
            <label class="form-label">Type</label>
            <select class="form-select" id="catType" required>
              <option value="">Select Type</option>
              <option value="INCOME">Income</option>
              <option value="EXPENSE">Expense</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Icon (emoji or Bootstrap icon class)</label>
            <input type="text" class="form-control" id="catIcon" placeholder="🍔 or bi-bag">
          </div>
          <div class="mb-3">
            <label class="form-label">Color</label>
            <div class="d-flex gap-2 flex-wrap" id="color-picker">
              <!-- Rendered by JS -->
            </div>
            <input type="hidden" id="catColor" value="#4ecca3">
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="catDesc" rows="2" placeholder="Brief description..."></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-glow" onclick="saveCategory()"><i class="bi bi-check-lg me-1"></i>Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script>
  Auth.requireAuth();
  UI.initSidebar();
  UI.initHeader();
  let myModal = new bootstrap.Modal(document.getElementById('catModal'));
  let allCategories = [];
  let activeType = '';

  const COLORS = ['#4ecca3','#e94560','#3b82f6','#f59e0b','#8b5cf6','#ec4899','#14b8a6','#f97316','#6366f1'];

  function renderColorPicker(selected) {
    const cp = document.getElementById('color-picker');
    cp.innerHTML = COLORS.map(c => `
      <div onclick="selectColor('${c}', this)" style="
        width:28px;height:28px;border-radius:50%;background:${c};cursor:pointer;
        border:3px solid ${c === selected ? '#fff' : 'transparent'};
        box-shadow:${c === selected ? '0 0 0 2px '+c : 'none'};
        transition:all .2s;
      "></div>
    `).join('');
  }

  function selectColor(color, el) {
    document.getElementById('catColor').value = color;
    document.querySelectorAll('#color-picker > div').forEach(d => d.style.border = '3px solid transparent');
    el.style.border = '3px solid #fff';
    el.style.boxShadow = '0 0 0 2px ' + color;
  }

  function filterType(type, btn) {
    activeType = type;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
  }

  function filterSearch() {
    renderGrid();
  }

  function renderGrid() {
    const query = (document.getElementById('searchInput').value || '').toLowerCase();
    const grid = document.getElementById('category-grid');
    const emptyContainer = document.getElementById('empty-state-container');

    const filtered = allCategories.filter(c => {
      const typeMatch = !activeType || c.type === activeType;
      const searchMatch = !query || c.name.toLowerCase().includes(query) || (c.description || '').toLowerCase().includes(query);
      return typeMatch && searchMatch;
    });

    grid.innerHTML = '';
    emptyContainer.innerHTML = '';

    if (filtered.length === 0) {
      UI.renderEmptyState(emptyContainer, 'No Categories Found', 'Create your first category to start organizing.', 'bi-tags', 'Add Category', openModal);
      return;
    }

    filtered.forEach(cat => {
      const isIncome = cat.type === 'INCOME';
      const color = cat.color || (isIncome ? '#4ecca3' : '#e94560');
      grid.innerHTML += `
        <div class="col-md-4 col-lg-3 animate-in">
          <div class="glass-card h-100 d-flex flex-column">
            <div class="d-flex align-items-center gap-3 mb-3">
              <div style="width:48px;height:48px;border-radius:12px;background:${color}22;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:1px solid ${color}55;">
                ${cat.icon ? `<span>${cat.icon}</span>` : `<i class="bi bi-tag" style="color:${color};"></i>`}
              </div>
              <div class="flex-grow-1 overflow-hidden">
                <div class="fw-600 text-truncate" style="font-size:0.95rem;">${cat.name}</div>
                <span class="badge ${isIncome ? 'income' : 'expense'}" style="font-size:0.7rem;">${cat.type}</span>
              </div>
            </div>
            ${cat.description ? `<p class="text-secondary mb-3" style="font-size:0.82rem;flex-grow:1;">${cat.description}</p>` : '<div class="flex-grow-1"></div>'}
            <div class="d-flex gap-2 mt-2">
              <button class="btn btn-sm btn-outline-info flex-grow-1" onclick='editCategory(${JSON.stringify(cat)})'><i class="bi bi-pencil me-1"></i>Edit</button>
              <button class="btn btn-sm btn-outline-danger flex-grow-1" onclick="deleteCategory(${cat.id})"><i class="bi bi-trash me-1"></i>Delete</button>
            </div>
          </div>
        </div>
      `;
    });
  }

  async function loadCategories() {
    const grid = document.getElementById('category-grid');
    grid.innerHTML = Array(8).fill('<div class="col-md-4 col-lg-3"><div class="glass-card skeleton-loader" style="height:150px;"></div></div>').join('');
    try {
      allCategories = await Api.get(`/categories?userId=${Api.getUserId()}`);
      renderGrid();
    } catch (err) { UI.showToast(err.message, 'error'); }
  }

  function openModal() {
    document.getElementById('catForm').reset();
    document.getElementById('catId').value = '';
    document.getElementById('catColor').value = '#4ecca3';
    document.getElementById('modalTitle').textContent = 'Add Category';
    renderColorPicker('#4ecca3');
    myModal.show();
  }

  function editCategory(cat) {
    document.getElementById('catId').value = cat.id;
    document.getElementById('catName').value = cat.name;
    document.getElementById('catType').value = cat.type;
    document.getElementById('catIcon').value = cat.icon || '';
    document.getElementById('catColor').value = cat.color || '#4ecca3';
    document.getElementById('catDesc').value = cat.description || '';
    document.getElementById('modalTitle').textContent = 'Edit Category';
    renderColorPicker(cat.color || '#4ecca3');
    myModal.show();
  }

  async function saveCategory() {
    const form = document.getElementById('catForm');
    if (!form.checkValidity()) { form.reportValidity(); return; }
    const id = document.getElementById('catId').value;
    const payload = {
      name: document.getElementById('catName').value,
      type: document.getElementById('catType').value,
      icon: document.getElementById('catIcon').value,
      color: document.getElementById('catColor').value,
      description: document.getElementById('catDesc').value
    };
    UI.showLoading();
    try {
      if (id) { await Api.put(`/categories/${id}?userId=${Api.getUserId()}`, payload); UI.showToast('Category updated!'); }
      else { await Api.post(`/categories?userId=${Api.getUserId()}`, payload); UI.showToast('Category added!'); }
      myModal.hide();
      loadCategories();
    } catch (err) { UI.showToast(err.message, 'error'); }
    finally { UI.hideLoading(); }
  }

  async function deleteCategory(id) {
    if (!confirm('Delete this category? Existing records won\'t be deleted.')) return;
    UI.showLoading();
    try {
      await Api.del(`/categories/${id}?userId=${Api.getUserId()}`);
      UI.showToast('Category deleted.'); loadCategories();
    } catch (err) { UI.showToast(err.message, 'error'); }
    finally { UI.hideLoading(); }
  }

  // Inject filter-tab active style
  const style = document.createElement('style');
  style.textContent = `.filter-tab{background:transparent;color:var(--text-secondary);border:1px solid var(--glass-border);border-radius:20px;padding:4px 16px;transition:var(--transition);}.filter-tab.active,.filter-tab:hover{background:var(--accent);color:#000;border-color:var(--accent);}`;
  document.head.appendChild(style);

  loadCategories();
</script>
</body>
</html>
