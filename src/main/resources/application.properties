# ============================================
# Smart Expense Tracker - Main Configuration
# ============================================
spring.application.name=smart-expense-tracker
server.port=8080

# Active Profile (override with: -Dspring.profiles.active=dev)
spring.profiles.active=local

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# JWT Configuration
# ============================================
app.jwt.secret=dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIHNtYXJ0ZXhwZW5zZXRyYWNrZXI=
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ============================================
# Jackson Date Format
# ============================================
spring.jackson.serialization.write-dates-as-timestamps=false

# ============================================
# Async / Email
# ============================================
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=10

# ============================================
# Swagger / OpenAPI
# ============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ============================================
# Logging
# ============================================
logging.config=classpath:logback-spring.xml
