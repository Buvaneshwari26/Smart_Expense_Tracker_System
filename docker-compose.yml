version: '3.8'

services:
  # MySQL Database
  mysql-db:
    image: mysql:8.0
    container_name: expense-tracker-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smart_expense_tracker
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - expense-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10

  # Spring Boot Application
  expense-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expense-tracker-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:mysql://mysql-db:3306/smart_expense_tracker?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIHNtYXJ0ZXhwZW5zZXRyYWNrZXI=
      JWT_EXPIRATION_MS: 86400000
      JWT_REFRESH_EXPIRATION_MS: 604800000
      MAIL_USERNAME: your-email@gmail.com
      MAIL_PASSWORD: your-app-password
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - expense-network
    volumes:
      - ./logs:/app/logs

volumes:
  mysql_data:

networks:
  expense-network:
    driver: bridge
