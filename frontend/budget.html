<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Budget Management — Smart Expense Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="css/globals.css"/>
</head>
<body>
<button class="sidebar-toggle d-md-none"><i class="bi bi-list"></i></button>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo-icon"><i class="bi bi-wallet2"></i></div>
      <span class="brand-text">ExpenseTracker</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link"><i class="bi bi-grid-1x2"></i><span>Dashboard</span></a>
      <a href="income.html" class="nav-link"><i class="bi bi-cash-stack"></i><span>Income</span></a>
      <a href="expense.html" class="nav-link"><i class="bi bi-credit-card"></i><span>Expenses</span></a>
      <a href="category.html" class="nav-link"><i class="bi bi-tags"></i><span>Categories</span></a>
      <a href="budget.html" class="nav-link"><i class="bi bi-pie-chart"></i><span>Budgets</span></a>
      <a href="savings.html" class="nav-link"><i class="bi bi-piggy-bank"></i><span>Savings Goals</span></a>
      <a href="reports.html" class="nav-link"><i class="bi bi-graph-up"></i><span>Reports</span></a>
      <a href="profile.html" class="nav-link"><i class="bi bi-person-circle"></i><span>Profile</span></a>
    </nav>
    <div class="sidebar-footer">
      <span id="sidebar-username">User</span>
      <button onclick="Auth.logout()" class="btn btn-sm btn-outline-danger"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </div>
  </aside>
  <main class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h2 class="mb-1">Budget Management</h2>
        <p class="text-secondary">Set monthly spending limits for categories</p>
      </div>
      <div>
        <button class="btn btn-glow" onclick="openModal()"><i class="bi bi-plus-lg me-2"></i>Add Budget</button>
      </div>
    </div>

    <div class="row g-4" id="budget-cards-container">
      <!-- Loaded via JS -->
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal fade" id="itemModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-glass">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="modalTitle">Add Budget</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-0">
        <form id="itemForm" class="glass-form">
          <input type="hidden" id="itemId">
          <div class="mb-3">
            <label class="form-label">Category</label>
            <select class="form-select" id="categoryId" required></select>
          </div>
          <div class="mb-3">
            <label class="form-label">Budget Amount</label>
            <input type="number" step="0.01" class="form-control" id="budgetAmount" required>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label">Month (1-12)</label>
              <input type="number" min="1" max="12" class="form-control" id="month" required>
            </div>
            <div class="col-6">
              <label class="form-label">Year</label>
              <input type="number" min="2000" class="form-control" id="year" required>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-glow" onclick="saveItem()">Save Budget</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script>
  Auth.requireAuth();
  UI.initSidebar();
  let myModal = new bootstrap.Modal(document.getElementById('itemModal'));
  
  async function loadCategories() {
    try {
      const data = await Api.get(`/categories?userId=${Api.getUserId()}`);
      const categories = data.filter(c => c.type === 'EXPENSE');
      const select = document.getElementById('categoryId');
      select.innerHTML = '<option value="">Select Category</option>' + 
        categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    } catch (err) {
      console.error('Failed to load categories', err);
    }
  }

  async function loadData() {
    UI.showLoading();
    try {
      // First get dashboard summary to get the progress calculations for the current month
      // Alternatively, we get all budgets and show them as cards. 
      // For full progress info, let's fetch all budgets, but progress needs expenses.
      // We will show basic budget info, and rely on dashboard for progress, 
      // or implement progress fetching here. For simplicity, we just list the budgets.
      const data = await Api.get(`/budgets?userId=${Api.getUserId()}`);
      const container = document.getElementById('budget-cards-container');
      container.innerHTML = '';
      if(data && data.length > 0) {
        data.forEach(item => {
          // Add leading zero to month
          const monthStr = item.month.toString().padStart(2, '0');
          container.innerHTML += `
            <div class="col-md-4">
              <div class="glass-card h-100 position-relative">
                <div class="d-flex justify-content-between align-items-start mb-3">
                  <div>
                    <h5 class="mb-1">${item.categoryName}</h5>
                    <span class="badge bg-secondary">${monthStr} / ${item.year}</span>
                  </div>
                  <div class="dropdown">
                    <button class="btn btn-sm btn-link text-secondary" data-bs-toggle="dropdown"><i class="bi bi-three-dots-vertical"></i></button>
                    <ul class="dropdown-menu dropdown-menu-dark">
                      <li><a class="dropdown-item" href="#" onclick='editItem(${JSON.stringify(item)})'><i class="bi bi-pencil me-2"></i>Edit</a></li>
                      <li><a class="dropdown-item text-danger" href="#" onclick="deleteItem(${item.id})"><i class="bi bi-trash me-2"></i>Delete</a></li>
                    </ul>
                  </div>
                </div>
                <div class="mt-4">
                  <div class="text-secondary mb-1">Limit</div>
                  <h3 class="text-white">${UI.formatCurrency(item.budgetAmount)}</h3>
                </div>
              </div>
            </div>
          `;
        });
      } else {
        container.innerHTML = '<div class="col-12"><div class="glass-card text-center py-5 text-secondary">No budgets configured yet</div></div>';
      }
    } catch (err) {
      UI.showToast(err.message, 'error');
    } finally {
      UI.hideLoading();
    }
  }

  function openModal() {
    document.getElementById('itemForm').reset();
    document.getElementById('itemId').value = '';
    const now = new Date();
    document.getElementById('month').value = now.getMonth() + 1;
    document.getElementById('year').value = now.getFullYear();
    document.getElementById('modalTitle').textContent = 'Add Budget';
    myModal.show();
  }

  function editItem(item) {
    document.getElementById('itemId').value = item.id;
    document.getElementById('categoryId').value = item.categoryId;
    document.getElementById('budgetAmount').value = item.budgetAmount;
    document.getElementById('month').value = item.month;
    document.getElementById('year').value = item.year;
    document.getElementById('modalTitle').textContent = 'Edit Budget';
    myModal.show();
  }

  async function saveItem() {
    const form = document.getElementById('itemForm');
    if(!form.checkValidity()) { form.reportValidity(); return; }
    
    const id = document.getElementById('itemId').value;
    const payload = {
      categoryId: document.getElementById('categoryId').value,
      budgetAmount: document.getElementById('budgetAmount').value,
      month: document.getElementById('month').value,
      year: document.getElementById('year').value
    };

    UI.showLoading();
    try {
      if(id) {
        await Api.put(`/budgets/${id}?userId=${Api.getUserId()}`, payload);
        UI.showToast('Budget updated successfully');
      } else {
        await Api.post(`/budgets?userId=${Api.getUserId()}`, payload);
        UI.showToast('Budget added successfully');
      }
      myModal.hide();
      loadData();
    } catch (err) {
      UI.showToast(err.message, 'error');
    } finally {
      UI.hideLoading();
    }
  }

  async function deleteItem(id) {
    if(!confirm('Are you sure you want to delete this budget?')) return;
    UI.showLoading();
    try {
      await Api.del(`/budgets/${id}?userId=${Api.getUserId()}`);
      UI.showToast('Budget deleted successfully');
      loadData();
    } catch (err) {
      UI.showToast(err.message, 'error');
    } finally {
      UI.hideLoading();
    }
  }

  loadCategories().then(() => loadData());
</script>
</body>
</html>
