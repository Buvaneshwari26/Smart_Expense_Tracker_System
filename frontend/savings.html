<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Savings Goals — Smart Expense Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="css/globals.css"/>
</head>
<body>
<button class="sidebar-toggle d-md-none"><i class="bi bi-list"></i></button>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo-icon"><i class="bi bi-wallet2"></i></div>
      <span class="brand-text">ExpenseTracker</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link"><i class="bi bi-grid-1x2"></i><span>Dashboard</span></a>
      <a href="income.html" class="nav-link"><i class="bi bi-cash-stack"></i><span>Income</span></a>
      <a href="expense.html" class="nav-link"><i class="bi bi-credit-card"></i><span>Expenses</span></a>
      <a href="category.html" class="nav-link"><i class="bi bi-tags"></i><span>Categories</span></a>
      <a href="budget.html" class="nav-link"><i class="bi bi-pie-chart"></i><span>Budgets</span></a>
      <a href="savings.html" class="nav-link"><i class="bi bi-piggy-bank"></i><span>Savings Goals</span></a>
      <a href="reports.html" class="nav-link"><i class="bi bi-graph-up"></i><span>Reports</span></a>
      <a href="profile.html" class="nav-link"><i class="bi bi-person-circle"></i><span>Profile</span></a>
    </nav>
    <div class="sidebar-footer">
      <span id="sidebar-username">User</span>
      <button onclick="Auth.logout()" class="btn btn-sm btn-outline-danger"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </div>
  </aside>
  <main class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h2 class="mb-1">Savings Goals</h2>
        <p class="text-secondary">Track progress towards your financial goals</p>
      </div>
      <div>
        <button class="btn btn-glow" onclick="openModal()"><i class="bi bi-plus-lg me-2"></i>Add Goal</button>
      </div>
    </div>

    <div class="row g-4" id="goals-container">
      <!-- Loaded via JS -->
    </div>
    <div id="pagination" class="mt-4 d-flex justify-content-end"></div>
  </main>
</div>

<!-- Modal: Add/Edit Goal -->
<div class="modal fade" id="itemModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-glass">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="modalTitle">Add Goal</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-0">
        <form id="itemForm" class="glass-form">
          <input type="hidden" id="itemId">
          <div class="mb-3">
            <label class="form-label">Goal Name</label>
            <input type="text" class="form-control" id="goalName" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Target Amount</label>
            <input type="number" step="0.01" class="form-control" id="targetAmount" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Current Amount</label>
            <input type="number" step="0.01" class="form-control" id="currentAmount" value="0">
          </div>
          <div class="mb-3">
            <label class="form-label">Target Date</label>
            <input type="date" class="form-control" id="targetDate" required>
          </div>
        </form>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-glow" onclick="saveItem()">Save Goal</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Add Savings -->
<div class="modal fade" id="addSavingsModal" tabindex="-1">
  <div class="modal-dialog modal-sm modal-dialog-centered modal-glass">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h5 class="modal-title">Add to Savings</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-0">
        <form class="glass-form" id="addSavingsForm">
          <input type="hidden" id="savingsGoalId">
          <div class="mb-3">
            <label class="form-label">Amount to Add/Subtract</label>
            <input type="number" step="0.01" class="form-control" id="savingsAmount" placeholder="e.g. 500 or -100" required>
          </div>
        </form>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-glow w-100" onclick="submitSavings()">Update Balance</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script>
  Auth.requireAuth();
  UI.initSidebar();
  let myModal = new bootstrap.Modal(document.getElementById('itemModal'));
  let savingsModal = new bootstrap.Modal(document.getElementById('addSavingsModal'));

  async function loadData(page = 0) {
    UI.showLoading();
    try {
      const data = await Api.get(`/goals?userId=${Api.getUserId()}&page=${page}&size=9`);
      const container = document.getElementById('goals-container');
      container.innerHTML = '';
      if(data.content && data.content.length > 0) {
        data.content.forEach(item => {
          const pct = Math.min(100, item.percentage || 0).toFixed(1);
          const achieved = pct >= 100;
          const barColor = achieved ? 'var(--income-green)' : 'var(--accent)';
          
          container.innerHTML += `
            <div class="col-md-4">
              <div class="glass-card h-100">
                <div class="d-flex justify-content-between align-items-start mb-3">
                  <h5 class="mb-0 text-truncate" title="${item.goalName}">${item.goalName}</h5>
                  <div class="dropdown">
                    <button class="btn btn-sm btn-link text-secondary p-0" data-bs-toggle="dropdown"><i class="bi bi-three-dots-vertical"></i></button>
                    <ul class="dropdown-menu dropdown-menu-dark">
                      <li><a class="dropdown-item" href="#" onclick='editItem(${JSON.stringify(item)})'><i class="bi bi-pencil me-2"></i>Edit</a></li>
                      <li><a class="dropdown-item text-danger" href="#" onclick="deleteItem(${item.id})"><i class="bi bi-trash me-2"></i>Delete</a></li>
                    </ul>
                  </div>
                </div>
                
                <div class="mb-4">
                  <div class="text-secondary small mb-1">Target Date: ${UI.formatDate(item.targetDate)}</div>
                  <h3 class="mb-0 text-white">${UI.formatCurrency(item.currentAmount)}</h3>
                  <div class="text-secondary small mt-1">of ${UI.formatCurrency(item.targetAmount)}</div>
                </div>

                <div class="mb-3">
                  <div class="d-flex justify-content-between mb-1 small">
                    <span>Progress</span>
                    <span style="color:${barColor}">${pct}%</span>
                  </div>
                  <div class="progress-bar-custom">
                    <div class="fill" style="width: ${pct}%; background-color: ${barColor}"></div>
                  </div>
                </div>

                <button class="btn btn-outline-info w-100" onclick="openAddSavings(${item.id})">
                  <i class="bi bi-plus-slash-minus me-2"></i>Update Balance
                </button>
              </div>
            </div>
          `;
        });
      } else {
        container.innerHTML = '<div class="col-12"><div class="glass-card text-center py-5 text-secondary">No savings goals found</div></div>';
      }
      UI.renderPagination(document.getElementById('pagination'), data, loadData);
    } catch (err) {
      UI.showToast(err.message, 'error');
    } finally {
      UI.hideLoading();
    }
  }

  function openModal() {
    document.getElementById('itemForm').reset();
    document.getElementById('itemId').value = '';
    document.getElementById('modalTitle').textContent = 'Add Goal';
    myModal.show();
  }

  function editItem(item) {
    document.getElementById('itemId').value = item.id;
    document.getElementById('goalName').value = item.goalName;
    document.getElementById('targetAmount').value = item.targetAmount;
    document.getElementById('currentAmount').value = item.currentAmount;
    document.getElementById('targetDate').value = item.targetDate;
    document.getElementById('modalTitle').textContent = 'Edit Goal';
    myModal.show();
  }

  async function saveItem() {
    const form = document.getElementById('itemForm');
    if(!form.checkValidity()) { form.reportValidity(); return; }
    
    const id = document.getElementById('itemId').value;
    const payload = {
      goalName: document.getElementById('goalName').value,
      targetAmount: document.getElementById('targetAmount').value,
      currentAmount: document.getElementById('currentAmount').value || 0,
      targetDate: document.getElementById('targetDate').value
    };

    UI.showLoading();
    try {
      if(id) {
        await Api.put(`/goals/${id}?userId=${Api.getUserId()}`, payload);
        UI.showToast('Goal updated successfully');
      } else {
        await Api.post(`/goals?userId=${Api.getUserId()}`, payload);
        UI.showToast('Goal added successfully');
      }
      myModal.hide();
      loadData(0);
    } catch (err) {
      UI.showToast(err.message, 'error');
    } finally {
      UI.hideLoading();
    }
  }

  async function deleteItem(id) {
    if(!confirm('Are you sure you want to delete this goal?')) return;
    UI.showLoading();
    try {
      await Api.del(`/goals/${id}?userId=${Api.getUserId()}`);
      UI.showToast('Goal deleted successfully');
      loadData(0);
    } catch (err) {
      UI.showToast(err.message, 'error');
    } finally {
      UI.hideLoading();
    }
  }

  function openAddSavings(id) {
    document.getElementById('addSavingsForm').reset();
    document.getElementById('savingsGoalId').value = id;
    savingsModal.show();
  }

  async function submitSavings() {
    const form = document.getElementById('addSavingsForm');
    if(!form.checkValidity()) { form.reportValidity(); return; }
    const id = document.getElementById('savingsGoalId').value;
    const amount = document.getElementById('savingsAmount').value;

    UI.showLoading();
    try {
      await Api.patch(`/goals/${id}/add-savings?userId=${Api.getUserId()}&amount=${amount}`);
      UI.showToast('Balance updated successfully');
      savingsModal.hide();
      loadData(0);
    } catch (err) {
      UI.showToast(err.message, 'error');
    } finally {
      UI.hideLoading();
    }
  }

  loadData(0);
</script>
</body>
</html>
