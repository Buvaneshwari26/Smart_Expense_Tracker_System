<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Categories — Smart Expense Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="css/globals.css"/>
</head>
<body>
<button class="sidebar-toggle d-md-none"><i class="bi bi-list"></i></button>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo-icon"><i class="bi bi-wallet2"></i></div>
      <span class="brand-text">ExpenseTracker</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link"><i class="bi bi-grid-1x2"></i><span>Dashboard</span></a>
      <a href="income.html" class="nav-link"><i class="bi bi-cash-stack"></i><span>Income</span></a>
      <a href="expense.html" class="nav-link"><i class="bi bi-credit-card"></i><span>Expenses</span></a>
      <a href="category.html" class="nav-link"><i class="bi bi-tags"></i><span>Categories</span></a>
      <a href="budget.html" class="nav-link"><i class="bi bi-pie-chart"></i><span>Budgets</span></a>
      <a href="savings.html" class="nav-link"><i class="bi bi-piggy-bank"></i><span>Savings Goals</span></a>
      <a href="reports.html" class="nav-link"><i class="bi bi-graph-up"></i><span>Reports</span></a>
      <a href="profile.html" class="nav-link"><i class="bi bi-person-circle"></i><span>Profile</span></a>
    </nav>
    <div class="sidebar-footer">
      <span id="sidebar-username">User</span>
      <button onclick="Auth.logout()" class="btn btn-sm btn-outline-danger"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </div>
  </aside>
  <main class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h2 class="mb-1">Categories</h2>
        <p class="text-secondary">Manage your income and expense categories</p>
      </div>
      <div>
        <button class="btn btn-glow" onclick="openModal()"><i class="bi bi-plus-lg me-2"></i>Add Category</button>
      </div>
    </div>

    <div class="glass-card">
      <div class="table-responsive">
        <table class="glass-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Type</th>
              <th>Description</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <!-- Loaded via JS -->
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal fade" id="itemModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-glass">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="modalTitle">Add Category</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-0">
        <form id="itemForm" class="glass-form">
          <input type="hidden" id="itemId">
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" id="name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Type</label>
            <select class="form-select" id="type" required>
              <option value="EXPENSE">Expense</option>
              <option value="INCOME">Income</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="description" rows="2"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-glow" onclick="saveItem()">Save Category</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script>
  Auth.requireAuth();
  UI.initSidebar();
  let myModal = new bootstrap.Modal(document.getElementById('itemModal'));

  async function loadData() {
    UI.showLoading();
    try {
      const data = await Api.get(`/categories?userId=${Api.getUserId()}`);
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';
      if(data && data.length > 0) {
        data.forEach(item => {
          const isIncome = item.type === 'INCOME';
          const badgeClass = isIncome ? 'income' : 'expense';
          tbody.innerHTML += `
            <tr>
              <td class="fw-bold">${item.name}</td>
              <td><span class="badge ${badgeClass}">${item.type}</span></td>
              <td>${item.description || '-'}</td>
              <td>
                <button class="btn btn-sm btn-outline-info me-1" onclick='editItem(${JSON.stringify(item)})'><i class="bi bi-pencil"></i></button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteItem(${item.id})"><i class="bi bi-trash"></i></button>
              </td>
            </tr>
          `;
        });
      } else {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center text-secondary py-4">No categories found</td></tr>';
      }
    } catch (err) {
      UI.showToast(err.message, 'error');
    } finally {
      UI.hideLoading();
    }
  }

  function openModal() {
    document.getElementById('itemForm').reset();
    document.getElementById('itemId').value = '';
    document.getElementById('modalTitle').textContent = 'Add Category';
    myModal.show();
  }

  function editItem(item) {
    document.getElementById('itemId').value = item.id;
    document.getElementById('name').value = item.name;
    document.getElementById('type').value = item.type;
    document.getElementById('description').value = item.description || '';
    document.getElementById('modalTitle').textContent = 'Edit Category';
    myModal.show();
  }

  async function saveItem() {
    const form = document.getElementById('itemForm');
    if(!form.checkValidity()) { form.reportValidity(); return; }
    
    const id = document.getElementById('itemId').value;
    const payload = {
      name: document.getElementById('name').value,
      type: document.getElementById('type').value,
      description: document.getElementById('description').value
    };

    UI.showLoading();
    try {
      if(id) {
        await Api.put(`/categories/${id}?userId=${Api.getUserId()}`, payload);
        UI.showToast('Category updated successfully');
      } else {
        await Api.post(`/categories?userId=${Api.getUserId()}`, payload);
        UI.showToast('Category added successfully');
      }
      myModal.hide();
      loadData();
    } catch (err) {
      UI.showToast(err.message, 'error');
    } finally {
      UI.hideLoading();
    }
  }

  async function deleteItem(id) {
    if(!confirm('Are you sure you want to delete this category? Ensure no expenses/incomes are linked to it.')) return;
    UI.showLoading();
    try {
      await Api.del(`/categories/${id}?userId=${Api.getUserId()}`);
      UI.showToast('Category deleted successfully');
      loadData();
    } catch (err) {
      UI.showToast(err.message, 'error');
    } finally {
      UI.hideLoading();
    }
  }

  loadData();
</script>
</body>
</html>
