<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Expense Tracker — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="css/globals.css"/>
</head>
<body class="auth-page">
<div class="auth-bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="auth-container">
  <div class="glass-card auth-card">
    <div class="auth-logo">
      <div class="logo-icon"><i class="bi bi-wallet2"></i></div>
      <h1 class="logo-title">Smart Expense<br/><span>Tracker</span></h1>
    </div>
    <h2 class="auth-heading">Welcome Back</h2>
    <p class="auth-sub">Sign in to your account to continue</p>

    <div id="alert-box" class="alert d-none" role="alert"></div>

    <form id="login-form" novalidate>
      <div class="form-floating mb-3">
        <input type="email" class="form-control glass-input" id="email" placeholder="Email" required/>
        <label for="email"><i class="bi bi-envelope me-2"></i>Email Address</label>
      </div>
      <div class="form-floating mb-3 position-relative">
        <input type="password" class="form-control glass-input" id="password" placeholder="Password" required/>
        <label for="password"><i class="bi bi-lock me-2"></i>Password</label>
        <button type="button" class="btn-toggle-pw" onclick="togglePw('password',this)">
          <i class="bi bi-eye"></i>
        </button>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-glow" id="login-btn">
        <span id="login-text"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</span>
        <span id="login-spinner" class="d-none spinner-border spinner-border-sm"></span>
      </button>
    </form>

    <p class="auth-footer mt-4">Don't have an account? <a href="register.html">Create one</a></p>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const text = document.getElementById('login-text');
    const spinner = document.getElementById('login-spinner');
    btn.disabled = true; text.classList.add('d-none'); spinner.classList.remove('d-none');
    try {
      const res = await Auth.login(
        document.getElementById('email').value,
        document.getElementById('password').value
      );
      showAlert('success', '✅ Login successful! Redirecting…');
      setTimeout(() => window.location.href = 'dashboard.html', 1000);
    } catch (err) {
      showAlert('danger', '❌ ' + (err.message || 'Invalid credentials'));
    } finally {
      btn.disabled = false; text.classList.remove('d-none'); spinner.classList.add('d-none');
    }
  });
  function showAlert(type, msg) {
    const box = document.getElementById('alert-box');
    box.className = `alert alert-${type}`;
    box.textContent = msg;
  }
  function togglePw(id, btn) {
    const inp = document.getElementById(id);
    const isText = inp.type === 'text';
    inp.type = isText ? 'password' : 'text';
    btn.querySelector('i').className = isText ? 'bi bi-eye' : 'bi bi-eye-slash';
  }
</script>
</body>
</html>
